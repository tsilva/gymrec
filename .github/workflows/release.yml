name: Release
on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      publish_existing:
        description: "Publish the current version even when the GitHub tag already exists"
        required: false
        type: boolean
        default: false
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run --with ruff ruff check .
      - run: |
          exit_code=0
          uv run --with pytest pytest || exit_code=$?
          if [ $exit_code -eq 5 ]; then
            echo "No tests collected -- skipping"
            exit 0
          fi
          exit $exit_code

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check version
        id: check-version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              config = tomllib.load(f)

          print(config["project"]["version"])
          PY
          )
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup uv
        if: steps.check-version.outputs.tag_exists == 'false' || inputs.publish_existing
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build package
        if: steps.check-version.outputs.tag_exists == 'false' || inputs.publish_existing
        run: uv build
      - name: Create GitHub release
        if: steps.check-version.outputs.tag_exists == 'false'
        run: gh release create "${{ steps.check-version.outputs.tag }}" --title "${{ steps.check-version.outputs.tag }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: steps.check-version.outputs.tag_exists == 'false' || inputs.publish_existing
        uses: pypa/gh-action-pypi-publish@release/v1
